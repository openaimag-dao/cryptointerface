services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aimag
      POSTGRES_PASSWORD: aimag
      POSTGRES_DB: aimag
    ports:
      - "5432:5432"
    volumes:
      - aimag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimag -d aimag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - aimag_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aimag_postgres_data:
  aimag_redis_data:
